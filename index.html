<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOBERANIA 3.0 | THZ NETWORK</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

    <div class="glass-container">
        <header class="header-main">
            <div class="logo-glow">
                <img src="tridente-gold.png" alt="Soberania Logo" class="main-icon">
            </div>
            <h1 class="title-soberania">SOBERANIA</h1>
            <p class="subtitle">IA de Scripts Lua de Alta Performance</p>
            <div class="status-badge">
                <span class="dot"></span> ONLINE
            </div>
        </header>

        <main class="chat-area" id="chatContainer">
            <div class="welcome-msg">
                <p>🔱 Bem-vindo à <strong>Soberania 3.0 — Soberania Suprema</strong> — IA de Scripts Lua. Sem restrições. Sem APIs. Zero limites. Descreva o script que você precisa.</p>
            </div>
            </main>

        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Descreva o script Lua que você precisa..." autocomplete="off">
                <button id="sendBtn" class="gold-btn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <div class="footer-info">
                Soberania v3.0 • 40 templates • Sem APIs • 100% educacional
            </div>
        </footer>
    </div>

    <script src="soberania-core-engine.js"></script>
    <script src="ui-controller.js"></script>
</body>
</html>
