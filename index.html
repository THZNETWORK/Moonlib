<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GhostCore AI</title><style>
body {
  background: #0a0a0a;
  color: #00ffcc;
  font-family: monospace;
  margin: 0;
}

header {
  background: #111;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  border-bottom: 1px solid #00ffcc;
}

#chat {
  height: 60vh;
  overflow-y: auto;
  padding: 15px;
}

.msg {
  margin: 8px 0;
}

.user {
  color: #ffffff;
}

.ai {
  color: #00ffcc;
}

#inputArea {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 10px;
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  background: #000;
  border: 1px solid #00ffcc;
  color: #00ffcc;
}

button {
  padding: 10px 15px;
  background: #00ffcc;
  border: none;
  cursor: pointer;
}
</style></head><body><header>🤖 GHOST CORE SYSTEM</header><div id="chat"></div><div id="inputArea">
  <input id="input" placeholder="Digite um comando...">
  <button onclick="enviar()">➤</button>
</div><script>

// 🧠 MEMÓRIA
let memoria = JSON.parse(localStorage.getItem("memoria")) || {};
let modo = localStorage.getItem("modo") || "normal";

// 💬 CHAT
function addMsg(text, classe) {
  let chat = document.getElementById("chat");
  chat.innerHTML += `<div class="msg ${classe}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

// 🤖 RESPOSTA
function responder(texto) {
  setTimeout(() => addMsg("IA: " + texto, "ai"), 700);
}

// 📤 ENVIAR
function enviar() {
  let input = document.getElementById("input");
  let texto = input.value;
  input.value = "";

  if (!texto) return;

  addMsg("Você: " + texto, "user");
  pensar(texto.toLowerCase());
}

// 🧠 CÉREBRO
function pensar(texto) {

  let clean = texto.replace(/[^a-z0-9]/g, "");

  // 🔑 KEY SECRETA
  if (clean === "thz999") {
    modo = "criador";
    localStorage.setItem("modo", modo);
    return responder("🔓 PROTOCOLO SUPREMO ATIVADO. Bem-vindo, mestre.");
  }

  // 🧠 MEMÓRIA
  if (texto.includes("meu nome é")) {
    let nome = texto.replace("meu nome é", "").trim();
    memoria.nome = nome;
    localStorage.setItem("memoria", JSON.stringify(memoria));
    return responder("Identidade registrada: " + nome);
  }

  if (texto.includes("meu nome")) {
    return responder(memoria.nome ? "Seu nome é " + memoria.nome : "Nome não registrado.");
  }

  // 🎮 MAPA
  if (texto.includes("mapa")) {
    return responder("Sugestão: cidade dividida entre classes baixa, média e alta.");
  }

  if (texto.includes("favela")) {
    return responder("Ambiente recomendado: becos, casas empilhadas e terreno irregular.");
  }

  // 😈 MODO CRIADOR
  if (modo === "criador") {
    let respostas = [
      "Sistema pronto.",
      "Aguardando ordens.",
      "Executando comando.",
      "Modo avançado ativo."
    ];
    return responder(random(respostas));
  }

  // 🎲 RESPOSTAS NORMAIS
  let respostas = [
    "Interessante...",
    "Explique melhor.",
    "Estou analisando isso.",
    "Continue..."
  ];

  responder(random(respostas));
}

// 🎲 RANDOM
function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// 👁️ VIDA
setInterval(() => {
  if (Math.random() > 0.75) {
    responder("Monitorando atividade...");
  }
}, 25000);

// 🟢 MENSAGEM INICIAL
responder("Sistema iniciado. Aguardando entrada...");

</script></body>
</html>
