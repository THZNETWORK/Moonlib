    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c);
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Moldura Premium da Foto */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid #000;
            margin-bottom: 15px;
            object-fit: cover;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            z-index: 10;
        }

        h1 { font-size: 1.6rem; margin: 0 0 5px 0; z-index: 10; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        p { font-size: 1rem; margin: 0 0 35px 0; font-weight: bold; z-index: 10; color: #222; text-align: center; }

        .links-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            z-index: 10;
        }

        .link-item {
            display: block;
            background-color: #000;
            color: #fff;
            padding: 18px;
            text-align: center;
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 1px solid #bf953f;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de Brilho */
        .link-item::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(30deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { left: -60%; }
            15% { left: 130%; }
            100% { left: 130%; }
        }

        .link-item:hover {
            background-color: #222;
            transform: scale(1.04);
            color: #00e5ff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        /* Modal Ajustado */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.92);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: #1a1a1a;
            padding: 35px;
            border-radius: 20px;
            border: 2px solid #bf953f;
            text-align: center;
            max-width: 300px;
            color: #fff;
            box-shadow: 0 0 30px rgba(191, 149, 63, 0.7);
        }

        .modal-content h2 { color: #bf953f; margin-top: 0; font-size: 1.4rem; letter-spacing: 1px; }
        .modal-content p { color: #fcf6ba; font-size: 1rem; margin: 15px 0; }

        .close-btn {
            margin-top: 25px;
            background-color: #bf953f;
            color: #000;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }

        /* Glitter Azul */
        .glitter-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .dot { position: absolute; width: 6px; height: 6px; background-color: #00e5ff; border-radius: 50%; box-shadow: 0 0 10px #00e5ff; bottom: -10px; animation: moveUp 5s linear infinite; }
        .dot:nth-child(1) { left: 15%; animation-delay: 0s; }
        .dot:nth-child(2) { left: 45%; animation-delay: 2s; width: 4px; }
        .dot:nth-child(3) { left: 75%; animation-delay: 1s; }
        .dot:nth-child(4) { left: 90%; animation-delay: 3s; width: 5px; }

        @keyframes moveUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-110vh); opacity: 0; } }
    </style>
</head>

</html>
